name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: false
        type: string

env:
  BUN_VERSION: '1.1'
  RUST_VERSION: 'stable'

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            triple: aarch64-apple-darwin
            os: macos-latest
          - target: bun-darwin-x64
            triple: x86_64-apple-darwin
            os: macos-latest
          - target: bun-linux-x64
            triple: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: bun-windows-x64
            triple: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install sidecar dependencies
        working-directory: packages/sidecar
        run: bun install

      - name: Build sidecar binary
        working-directory: packages/sidecar
        run: |
          bun build --compile --target=${{ matrix.target }} src/server.ts --outfile=dist/bfloat-sidecar-${{ matrix.triple }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: packages/sidecar/dist/bfloat-sidecar-${{ matrix.triple }}*
          if-no-files-found: error

  build-tauri:
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            triple: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: packages/desktop/src-tauri/sidecars/

      - name: Make sidecar executable
        if: matrix.platform != 'windows-latest'
        run: chmod +x packages/desktop/src-tauri/sidecars/bfloat-sidecar-${{ matrix.triple }}

      - name: Install frontend dependencies
        working-directory: packages/desktop
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }} -c src-tauri/tauri.prod.conf.json

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.triple }}
          path: |
            packages/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/**/release/bundle/**/*.app
            packages/desktop/src-tauri/target/**/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/**/release/bundle/**/*.rpm
            packages/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            packages/desktop/src-tauri/target/**/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/**/release/bundle/**/*.msi
          if-no-files-found: warn

  release:
    needs: [build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tauri-*

      - name: Display structure
        run: ls -R artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Release ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
          body: |
            ## Bfloat IDE v${{ steps.version.outputs.version }}

            ### Downloads

            **macOS**
            - Apple Silicon (M1/M2/M3): `Bfloat IDE_*_aarch64.dmg`
            - Intel: `Bfloat IDE_*_x64.dmg`

            **Windows**
            - Installer: `Bfloat IDE_*_x64-setup.exe`
            - MSI: `Bfloat IDE_*_x64_en-US.msi`

            **Linux**
            - AppImage: `Bfloat IDE_*_amd64.AppImage`
            - Debian/Ubuntu: `Bfloat IDE_*_amd64.deb`
            - Fedora/RHEL: `Bfloat IDE_*_amd64.rpm`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
