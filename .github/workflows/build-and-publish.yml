name: Build Tauri App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'packages/desktop/**'
      - 'packages/sidecar/**'
      - 'resources/templates/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: '1.2.4'
  RUST_VERSION: 'stable'

jobs:
  version-bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./packages/desktop/package.json').version")
          NEW=$(node -p "const [a,b,c] = '$CURRENT'.split('.').map(Number); [a,b,c+1].join('.')")
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/desktop/package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('packages/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped version: $CURRENT -> $NEW"

      - name: Commit version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/desktop/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build-sidecar:
    needs: version-bump
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            triple: aarch64-apple-darwin
            os: macos-latest
          - target: bun-darwin-x64
            triple: x86_64-apple-darwin
            os: macos-latest
          - target: bun-linux-x64
            triple: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: bun-windows-x64
            triple: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install sidecar dependencies
        working-directory: packages/sidecar
        run: bun install

      - name: Build sidecar binary
        working-directory: packages/sidecar
        run: |
          bun build --compile --target=${{ matrix.target }} src/server.ts --outfile=dist/bfloat-sidecar-${{ matrix.triple }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: packages/sidecar/dist/bfloat-sidecar-${{ matrix.triple }}*
          if-no-files-found: error

  build-tauri:
    needs: [version-bump, build-sidecar]
    if: always() && needs.build-sidecar.result == 'success' && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            triple: aarch64-apple-darwin
            allow_failure: false
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            triple: x86_64-apple-darwin
            allow_failure: false
          - platform: ubuntu-22.04
            args: ''
            triple: x86_64-unknown-linux-gnu
            allow_failure: false
          - platform: windows-latest
            args: ''
            triple: x86_64-pc-windows-msvc
            allow_failure: true
    runs-on: ${{ matrix.platform }}
    continue-on-error: ${{ matrix.allow_failure }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 rpm desktop-file-utils

      - name: Configure Linux bundle environment
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: packages/desktop/src-tauri/sidecars/

      - name: Make sidecar executable
        if: matrix.platform != 'windows-latest'
        run: chmod +x packages/desktop/src-tauri/sidecars/bfloat-sidecar-${{ matrix.triple }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: packages/desktop
        run: bun install

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: packages/desktop
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          NO_STRIP: '1'
          RUST_BACKTRACE: '1'
        run: bunx tauri build -v ${{ matrix.args }} -c src-tauri/tauri.prod.conf.json -c src-tauri/tauri.linux.conf.json

      - name: Build Tauri app
        if: matrix.platform != 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: packages/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }} -c src-tauri/tauri.prod.conf.json

      - name: Notarize, staple, and validate macOS artifacts
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find packages/desktop/src-tauri/target -path "*/release/bundle/macos/*.app" -type d | head -n 1)
          DMG_PATH=$(find packages/desktop/src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f | head -n 1)
          APP_ZIP_PATH="$RUNNER_TEMP/Bfloat-IDE-notarize.zip"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No macOS .app bundle found"
            exit 1
          fi

          NOTARY_ARGS=(--apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID")

          echo "Submitting app bundle for notarization: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$APP_ZIP_PATH"
          xcrun notarytool submit "$APP_ZIP_PATH" "${NOTARY_ARGS[@]}" --wait

          echo "Stapling app: $APP_PATH"
          xcrun stapler staple -v "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vvv -t exec "$APP_PATH"

          if [ -n "$DMG_PATH" ]; then
            echo "Submitting dmg for notarization: $DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" "${NOTARY_ARGS[@]}" --wait

            echo "Stapling dmg: $DMG_PATH"
            xcrun stapler staple -v "$DMG_PATH"
            xcrun stapler validate "$DMG_PATH"
          else
            echo "WARNING: No macOS .dmg bundle found; skipped DMG notarization"
          fi

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.triple }}
          path: |
            packages/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/**/release/bundle/**/*.app
            packages/desktop/src-tauri/target/**/release/bundle/**/*.tar.gz
            packages/desktop/src-tauri/target/**/release/bundle/**/*.zip
            packages/desktop/src-tauri/target/**/release/bundle/**/*.sig
            packages/desktop/src-tauri/target/**/release/bundle/**/*.json
            packages/desktop/src-tauri/target/**/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/**/release/bundle/**/*.rpm
            packages/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            packages/desktop/src-tauri/target/**/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/**/release/bundle/**/*.msi
          if-no-files-found: warn

  release:
    needs: [version-bump, build-tauri]
    runs-on: ubuntu-latest
    if: always() && needs.build-tauri.result == 'success' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.commit_sha || github.sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tauri-*

      - name: Display structure
        run: ls -R artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ] && [ -n "${{ needs.version-bump.outputs.version }}" ]; then
            echo "version=${{ needs.version-bump.outputs.version }}" >> $GITHUB_OUTPUT
          else
            REF_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ -n "$REF_VERSION" ] && [ "$REF_VERSION" != "$GITHUB_REF" ]; then
              echo "version=$REF_VERSION" >> $GITHUB_OUTPUT
            else
              echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Release ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
          body: |
            ## Bfloat IDE v${{ steps.version.outputs.version }}

            ### Downloads

            **macOS**
            - Apple Silicon (M1/M2/M3): `Bfloat IDE_*_aarch64.dmg`
            - Intel: `Bfloat IDE_*_x64.dmg`

            **Windows**
            - Installer: `Bfloat IDE_*_x64-setup.exe`
            - MSI: `Bfloat IDE_*_x64_en-US.msi`

            **Linux**
            - AppImage: `Bfloat IDE_*_amd64.AppImage`
            - Debian/Ubuntu: `Bfloat IDE_*_amd64.deb`
            - Fedora/RHEL: `Bfloat IDE_*_amd64.rpm`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install release tooling dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Upload update artifacts to S3
        run: pnpm upload:updates artifacts ${{ steps.version.outputs.version }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
          UPDATES_BUCKET: bfloat-ide-updates
          UPDATE_CHANNEL: stable
